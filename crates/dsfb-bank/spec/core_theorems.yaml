- id: CORE-01
  component: core
  ordinal: 1
  title: Structural Equivalence Theorem
  statement_summary: "On an admissible structural class with injective F, exact recoverability, residual nulling, and regime preservation coincide under the stack’s exact-reconstruction semantics."
  assumptions:
    - F injective on S0
    - exact reconstruction map
    - regime map defined
    - residual semantics defined
  variables:
    - "S0: admissible structural class"
    - "F: forward operator"
    - "R: exact reconstruction map"
    - "Gamma: regime map"
  expected_behavior:
    - exact witness cases align injectivity, exact recovery, zero residual, and stable regime labels
    - boundary cases show which coincidence fails when exact assumptions are removed
  witness_cases:
    - exact cross-stack pipeline trace on an admissible class
    - contrast case with residual mismatch outside exact semantics
  runner: runners::core
  outputs:
    - theorem_witness_csv
- id: CORE-02
  component: core
  ordinal: 2
  title: DSFB Representation Theorem
  statement_summary: "Any admissible exact DSFB reconstruction can be represented as projection onto admissible observations followed by inversion of the forward operator on the image."
  assumptions:
    - exact recoverability
    - injective forward map on admissible class
  variables:
    - "F: forward operator"
    - "R: reconstruction map"
    - "P: projection onto admissible observations"
  expected_behavior:
    - witness rows show admissible observations projected to the image and exactly inverted
    - contrast rows show outside-image observations require projection before inversion
  witness_cases:
    - admissible exact-image observation trace
    - outside-image projection contrast
  runner: runners::core
  outputs:
    - theorem_witness_csv
- id: CORE-03
  component: core
  ordinal: 3
  title: TMTR Stability Theorem
  statement_summary: "Trust-monotone recursion over a lower-bounded or complete trust order converges to a stable trust level or fixed-point regime under the theorem assumptions."
  assumptions:
    - trust monotonicity
    - lower bound or completeness
  variables:
    - "U: trust-monotone update"
    - "T: trust observable"
    - "s_n: trust orbit"
  expected_behavior:
    - trust traces descend to a stable suffix
    - fixed-point or stable-trust rows appear after finite iteration in the finite witness systems
  witness_cases:
    - descending trust orbit with fixed-point stabilization
    - stable suffix trace on a bounded trust scale
  runner: runners::core
  outputs:
    - theorem_witness_csv
- id: CORE-04
  component: core
  ordinal: 4
  title: Trust–Graph Galois Correspondence
  statement_summary: "Trust thresholds and trust-gated causal graphs form a Galois-style correspondence between threshold order and edge-admissibility order."
