- id: CORE-08
  component: core
  ordinal: 8
  title: ADD Soundness Theorem
  statement_summary: "If anomaly detection fires under deterministic residual semantics, the observation is structurally inconsistent with the reconstructed forward image."
  assumptions:
    - residual operator defined
    - anomaly predicate thresholded on residual semantics
  variables:
    - "r_t: residual"
    - "A: anomaly predicate"
    - "F(R(y)): reconstructed forward image"
  expected_behavior:
    - nominal rows stay on the reconstructed forward image with anomaly false
    - anomaly rows show nonzero residual and structural inconsistency with anomaly true
  witness_cases:
    - nominal exact-image case
    - anomalous residual-threshold case
  runner: runners::core
  outputs:
    - theorem_witness_csv
