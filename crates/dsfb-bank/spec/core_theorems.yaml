- id: CORE-11
  component: core
  ordinal: 11
  title: Functorial Compression Theorem
  statement_summary: "The stack induces a functor-like compression from observation-side inference to structural-side inference, with H∘R_S∘F = H for structural observables H in {Γ,T,C} on the admissible class."
  assumptions:
    - exact recoverability
    - deterministic structural observables
  variables:
    - "H: structural observable in {Gamma, T, C}"
    - "F: forward operator"
    - "R_S: structural reconstruction"
  expected_behavior:
    - witness rows verify observable preservation for regime, trust, and causal summaries
    - exact-image rows show zero observable discrepancy after compression and recovery
  witness_cases:
    - regime observable preservation case
    - trust and causal observable preservation cases
  runner: runners::core
  outputs:
    - theorem_witness_csv
