- id: TMTR-01
  component: tmtr
  ordinal: 1
  title: Monotonicity of Trust Along TMTR Orbits
  statement_summary: "For s_{n+1}=U(s_n), trust values T(s_n) form a nonincreasing sequence."
  assumptions:
    - T(U(s)) <= T(s)
  variables:
    - "U: TMTR update operator"
    - "T: trust function"
    - "s_n: orbit states"
  expected_behavior:
    - trust sequence monotone descending
  witness_cases:
    - descending trust orbit rows
    - stabilization suffix rows
  runner: runners::tmtr
  outputs:
    - theorem_witness_csv
- id: TMTR-02
  component: tmtr
  ordinal: 2
  title: k-Step Trust Monotonicity
  statement_summary: "For all k>=1, T(U^k(s)) <= T(s)."
  assumptions:
    - trust monotonicity
  variables:
    - "U^k: k-step iterate"
    - "T: trust function"
    - "s: initial state"
  expected_behavior:
    - iterated updates never increase trust
  witness_cases:
    - multi-step descent orbit rows
    - long-horizon trust comparison rows
  runner: runners::tmtr
  outputs:
    - theorem_witness_csv
- id: TMTR-03
  component: tmtr
  ordinal: 3
