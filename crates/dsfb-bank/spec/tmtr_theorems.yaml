  outputs:
    - theorem_witness_csv
- id: TMTR-06
  component: tmtr
  ordinal: 6
  title: Minimal Trust Along an Orbit
  statement_summary: "At step N, T(s_N) equals the minimum trust value seen up to step N."
  assumptions:
    - monotone descent
  variables:
    - "s_N: orbit state at step N"
    - "T: trust function"
    - "min_{0<=n<=N} T(s_n): rolling minimum"
  expected_behavior:
    - rolling minimum equals current value
  witness_cases:
    - descending orbit rows
    - rolling-minimum comparison rows
  runner: runners::tmtr
  outputs:
    - theorem_witness_csv
- id: TMTR-07
  component: tmtr
  ordinal: 7
  title: Strict Descent Excludes Nontrivial Fixed Points
  statement_summary: "If T(U(s)) < T(s), then s is not a fixed point."
  assumptions:
    - strict descent at s
  variables:
    - "s: current state"
    - "U(s): updated state"
    - "T: trust function"
  expected_behavior:
    - strict descent rows have s != U(s)
  witness_cases:
    - strict-descent non-fixed rows
    - fixed-point contrast rows
  runner: runners::tmtr
  outputs:
    - theorem_witness_csv
