- id: TMTR-05
  component: tmtr
  ordinal: 5
  title: Fixed Points Preserve Trust
  statement_summary: "If s* is a fixed point of U, then T(U(s*))=T(s*)."
  assumptions:
    - fixed point exists
  variables:
    - "s*: fixed point"
    - "U: update operator"
    - "T: trust function"
  expected_behavior:
