    - first-difference sign rows
  runner: runners::add
  outputs:
    - theorem_witness_csv
- id: ADD-08
  component: add
  ordinal: 8
  title: Persistent Monotone Drift is Detectable by Difference Threshold
  statement_summary: "If |Δy_t| >= epsilon > tau_Δ on an interval, every step on that interval triggers difference-based detection."
  assumptions:
    - persistent drift exceeds threshold
  variables:
    - "Delta y_t: first difference"
    - "epsilon: deterministic drift floor"
    - "tau_Delta: threshold"
  expected_behavior:
    - interval-wide detections
  witness_cases:
    - persistent drift rows
    - interval-wide detector rows
  runner: runners::add
  outputs:
    - theorem_witness_csv
- id: ADD-09
  component: add
  ordinal: 9
  title: Step Discontinuities Produce Difference Anomalies
  statement_summary: "A step change of amplitude A yields |Δy|=|A| at the step time, so threshold exceedance triggers if |A|>tau_Δ."
  assumptions:
    - step signal
  variables:
    - "A: step amplitude"
    - "Delta y_t: first difference at the step"
    - "tau_Delta: threshold"
  expected_behavior:
    - single-step anomaly at discontinuity
  witness_cases:
    - step-signal rows
    - discontinuity detector rows
  runner: runners::add
  outputs:
    - theorem_witness_csv
