- id: ADD-07
  component: add
  ordinal: 7
  title: Monotone Drift Produces Constant-Sign First Difference
  statement_summary: "Nondecreasing signals have nonnegative first differences; nonincreasing signals have nonpositive first differences."
  assumptions:
    - monotonic signal segment
  variables:
    - "y_t: monotone signal segment"
    - "Delta y_t: first difference"
    - "sign(Delta y_t): difference sign"
  expected_behavior:
