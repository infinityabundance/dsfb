- id: ADD-11
  component: add
  ordinal: 11
  title: Residual Representation of Model Mismatch
  statement_summary: "If true evolution is y_t=g(y_{t-1}) but the detector uses f, then residual equals g(y_{t-1})-f(y_{t-1})."
  assumptions:
    - deterministic true and reference models
  variables:
    - "g: true deterministic model"
    - "f: reference detector model"
    - "r_t: residual"
  expected_behavior:
    - mismatch rows reflect model discrepancy
  witness_cases:
    - reference-model mismatch rows
    - residual-equality rows
  runner: runners::add
  outputs:
    - theorem_witness_csv
- id: ADD-12
  component: add
  ordinal: 12
  title: Exact Model Match Gives Zero Residual
  statement_summary: "If y_t=f(y_{t-1}) exactly, residual is zero."
  assumptions:
    - reference equals true model
  variables:
    - "f: deterministic reference model"
    - "y_t: signal trace"
    - "r_t: residual"
  expected_behavior:
    - all residual rows zero
  witness_cases:
    - exact-model signal rows
    - zero-residual rows
  runner: runners::add
  outputs:
    - theorem_witness_csv
- id: ADD-13
  component: add
  ordinal: 13
  title: Bounded Model Error Gives Bounded Residual
  statement_summary: "If |g(x)-f(x)|<=M on relevant states, then residual magnitude is bounded by M."
  assumptions:
    - bounded model discrepancy
  variables:
    - "g,f: deterministic models"
    - "M: model-discrepancy bound"
    - "r_t: residual"
  expected_behavior:
    - residuals remain within bound
  witness_cases:
    - bounded mismatch rows
    - residual-bound comparison rows
  runner: runners::add
  outputs:
    - theorem_witness_csv
- id: ADD-14
  component: add
  ordinal: 14
  title: Threshold Separation Eliminates False Negatives Relative to a Deterministic Bound
  statement_summary: "If every anomaly of interest satisfies |r_t|>=gamma>tau_r, none of those anomalies are missed."
  assumptions:
    - anomaly lower bound gamma
    - threshold below gamma
  variables:
    - "gamma: anomaly residual floor"
    - "tau_r: detector threshold"
    - "A_r: residual detector"
  expected_behavior:
    - all anomalous rows detected
  witness_cases:
    - high-residual anomaly rows
    - detector-hit rows
  runner: runners::add
  outputs:
    - theorem_witness_csv
- id: ADD-15
  component: add
  ordinal: 15
  title: Threshold Safety Eliminates False Positives Relative to a Deterministic Bound
  statement_summary: "If all nominal behavior satisfies |r_t|<=beta<tau_r, no nominal row is flagged."
  assumptions:
    - nominal bound beta
    - threshold above beta
  variables:
    - "beta: nominal residual bound"
    - "tau_r: detector threshold"
    - "A_r: residual detector"
  expected_behavior:
    - no nominal detections
  witness_cases:
    - nominal exact-trace rows
    - no-flag detector rows
  runner: runners::add
  outputs:
    - theorem_witness_csv
