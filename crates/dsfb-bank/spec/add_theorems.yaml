- id: ADD-01
  component: add
  ordinal: 1
  title: Zero Residual Implies No Residual-Threshold Anomaly
  statement_summary: "If residual is zero on an interval, no residual-threshold anomaly occurs there."
  assumptions:
    - residual detector threshold tau_r>0
  variables:
    - "r_t: residual trace"
    - "tau_r: residual detector threshold"
    - "A_r: residual-threshold detector"
  expected_behavior:
    - zero residual rows are non-anomalous
  witness_cases:
    - exact-model residual-zero rows
    - threshold comparison rows
  runner: runners::add
  outputs:
    - theorem_witness_csv
- id: ADD-02
  component: add
