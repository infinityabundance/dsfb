- id: ADD-05
  component: add
  ordinal: 5
  title: Constant Signals are ADD-Silent Under Difference Tests
  statement_summary: "Constant signals have zero first and second differences, so no difference-based anomaly occurs for positive thresholds."
  assumptions:
    - positive thresholds
  variables:
    - "y_t: constant signal"
    - "Delta y_t: first difference"
    - "Delta^2 y_t: second difference"
  expected_behavior:
    - flat traces show no detections
  witness_cases:
    - constant-signal rows
    - difference-detector silence rows
  runner: runners::add
  outputs:
    - theorem_witness_csv
- id: ADD-06
  component: add
  ordinal: 6
