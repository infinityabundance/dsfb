- id: SRD-01
  component: srd
  ordinal: 1
  title: Partition of State Space by Regimes
  statement_summary: "The regime regions X_r = {x : Γ(x)=r} partition the state space."
  assumptions:
    - deterministic regime map Γ
  variables:
    - "Gamma: regime map"
    - "X_r: regime region"
    - "x: state"
  expected_behavior:
    - every state assigned exactly one label
  witness_cases:
    - fine-regime labeling rows
    - indicator-sum rows
  runner: runners::srd
  outputs:
    - theorem_witness_csv
- id: SRD-02
  component: srd
  ordinal: 2
  title: Uniqueness of Regime Membership
  statement_summary: "Every state belongs to exactly one regime."
  assumptions:
    - deterministic labeling
  variables:
    - "Gamma: regime map"
    - "x: state"
    - "r: regime label"
  expected_behavior:
    - no multi-regime assignments
  witness_cases:
    - one-label-per-state rows
    - indicator-sum rows
  runner: runners::srd
  outputs:
    - theorem_witness_csv
- id: SRD-03
  component: srd
  ordinal: 3
  title: Transition Detection by Label Change
  statement_summary: "A regime transition occurs exactly when consecutive regime labels differ."
  assumptions:
    - discrete-time trajectory
  variables:
    - "Gamma(x_t): regime label at time t"
    - "transition_flag: regime-change indicator"
    - "x_t: trajectory state"
  expected_behavior:
    - transition rows align with label changes
  witness_cases:
    - fine-regime trajectory rows
    - transition-flag rows
  runner: runners::srd
  outputs:
    - theorem_witness_csv
- id: SRD-04
  component: srd
  ordinal: 4
  title: No Transition Under Constant Regime Label
  statement_summary: "If Γ(x_t)=Γ(x_{t-1}), no transition occurs at time t."
  assumptions:
    - deterministic labels
  variables:
    - "Gamma(x_t): regime label"
    - "transition_flag: transition indicator"
    - "x_t: trajectory state"
  expected_behavior:
    - constant-label pairs marked non-transition
  witness_cases:
    - constant-regime trajectory rows
    - no-transition rows
  runner: runners::srd
  outputs:
    - theorem_witness_csv
- id: SRD-05
  component: srd
  ordinal: 5
  title: Transition Count Bound on Finite Trajectories
  statement_summary: "A trajectory segment of length N+1 has at most N transitions."
  assumptions:
    - finite discrete trajectory
  variables:
    - "x_0,...,x_N: finite trajectory"
    - "transition_count: number of regime changes"
    - "N: number of adjacent pairs"
  expected_behavior:
    - counted transitions <= number of adjacent pairs
  witness_cases:
    - finite trajectory rows
    - transition-count summary rows
  runner: runners::srd
  outputs:
    - theorem_witness_csv
- id: SRD-06
  component: srd
  ordinal: 6
  title: Pigeonhole Recurrence of Regimes
  statement_summary: "If a trajectory is longer than the number of regime labels, at least one label repeats."
  assumptions:
    - finite regime set
  variables:
    - "R: finite regime set"
    - "Gamma(x_t): regime sequence"
    - "trajectory length: number of samples"
  expected_behavior:
    - long trajectories show repeated labels
  witness_cases:
    - periodic regime-sequence rows
    - repeated-label witness rows
  runner: runners::srd
  outputs:
    - theorem_witness_csv
- id: SRD-07
  component: srd
  ordinal: 7
  title: Existence of a Constant-Regime Subsegment
  statement_summary: "If a finite trajectory has fewer than N transitions over N+1 points, at least one adjacent pair shares the same regime."
  assumptions:
    - finite trajectory
  variables:
    - "x_0,...,x_N: finite trajectory"
    - "transition_count: regime changes"
    - "Gamma(x_t): regime labels"
  expected_behavior:
    - identify constant-regime adjacent pair
  witness_cases:
    - block-constant regime rows
    - adjacent non-transition rows
  runner: runners::srd
  outputs:
    - theorem_witness_csv
- id: SRD-08
  component: srd
  ordinal: 8
  title: Indicator Characterization of Regime Membership
  statement_summary: "x in X_r iff indicator 1_r(x)=1."
  assumptions:
    - regime indicator functions defined
  variables:
    - "1_r: regime indicator"
    - "X_r: regime region"
    - "x: state"
  expected_behavior:
    - indicator table matches labels
  witness_cases:
    - indicator rows
    - fine-regime membership rows
  runner: runners::srd
  outputs:
    - theorem_witness_csv
- id: SRD-09
  component: srd
  ordinal: 9
  title: Indicator Sum Identity
  statement_summary: "For every state, the sum of regime indicators equals 1."
  assumptions:
    - deterministic unique labeling
  variables:
    - "1_r: regime indicators"
    - "x: state"
    - "sum_r 1_r(x): indicator sum"
  expected_behavior:
    - row-wise indicator sums equal 1
  witness_cases:
    - indicator-sum rows
    - regime assignment rows
  runner: runners::srd
  outputs:
    - theorem_witness_csv
- id: SRD-10
  component: srd
  ordinal: 10
  title: Transition Detection by Indicator Difference
  statement_summary: "A transition occurs iff some regime indicator changes value between consecutive states."
  assumptions:
    - indicator functions defined
  variables:
    - "1_r(x_t): regime indicators over time"
    - "transition_flag: transition indicator"
    - "x_t: trajectory state"
  expected_behavior:
    - indicator changes coincide with label transitions
  witness_cases:
    - indicator-change rows
    - transition-flag rows
  runner: runners::srd
  outputs:
    - theorem_witness_csv
