    - "x_t: state trajectory"
    - "Gamma(x_t): regime sequence"
  expected_behavior:
    - duplicate trajectories produce identical labels
  witness_cases:
    - original trajectory rows
    - replayed trajectory rows
  runner: runners::srd
  outputs:
    - theorem_witness_csv
