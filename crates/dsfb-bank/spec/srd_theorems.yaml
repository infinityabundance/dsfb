- id: SRD-13
  component: srd
  ordinal: 13
  title: Eventually Constant State Implies Eventually Constant Regime
  statement_summary: "If the state trajectory becomes constant, the regime sequence becomes constant."
  assumptions:
    - eventual constant state suffix
  variables:
    - "x_t: state trajectory"
    - "Gamma(x_t): regime sequence"
    - "eventual suffix: stabilized segment"
  expected_behavior:
    - regime suffix constant as well
  witness_cases:
    - stabilizing state rows
    - constant-regime suffix rows
