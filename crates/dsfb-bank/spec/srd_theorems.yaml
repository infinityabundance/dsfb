  outputs:
    - theorem_witness_csv
- id: SRD-14
  component: srd
  ordinal: 14
  title: Eventually Constant Regime Implies Finitely Many Transitions
  statement_summary: "If regime labels eventually stabilize, only finitely many transitions occur."
  assumptions:
    - eventual constant regime
  variables:
    - "Gamma(x_t): regime sequence"
    - "transition_count: number of regime changes"
    - "stabilized suffix: eventual constant segment"
  expected_behavior:
    - no transitions beyond stabilization point
  witness_cases:
    - stabilizing regime rows
    - finite-transition summary rows
  runner: runners::srd
  outputs:
    - theorem_witness_csv
- id: SRD-15
  component: srd
  ordinal: 15
  title: Two-Regime Alternation Produces a Transition at Every Step
  statement_summary: "If labels alternate r,s,r,s,... then every adjacent pair is a transition."
  assumptions:
    - two distinct regimes alternating
  variables:
    - "r,s: distinct regimes"
    - "Gamma(x_t): alternating regime sequence"
    - "transition_flag: transition indicator"
  expected_behavior:
    - transition count maximal
  witness_cases:
    - alternating regime rows
    - all-step transition rows
  runner: runners::srd
  outputs:
    - theorem_witness_csv
- id: SRD-16
  component: srd
  ordinal: 16
  title: Block-Constant Regime Sequences Have Boundary-Localized Transitions
  statement_summary: "If the regime sequence is constant on blocks, transitions occur only at block boundaries."
  assumptions:
    - piecewise-constant labels
  variables:
    - "Gamma(x_t): block-constant regime sequence"
    - "block boundaries: regime-change indices"
    - "transition_flag: transition indicator"
  expected_behavior:
    - transitions only at boundaries
  witness_cases:
    - block-constant regime rows
    - boundary-localized transition rows
  runner: runners::srd
  outputs:
    - theorem_witness_csv
- id: SRD-17
  component: srd
  ordinal: 17
  title: Merged-Regime Coarsening Preserves Determinism
  statement_summary: "If π : R -> Q is a coarsening map, then Γ' = π∘Γ is deterministic."
  assumptions:
    - deterministic Γ and π
  variables:
    - "Gamma: fine regime map"
    - "pi: coarsening map"
    - "Gamma': coarsened regime map"
  expected_behavior:
    - coarsened labels uniquely defined
  witness_cases:
    - fine-to-coarse labeling rows
    - deterministic coarse-label rows
  runner: runners::srd
  outputs:
    - theorem_witness_csv
- id: SRD-18
  component: srd
  ordinal: 18
  title: Coarsening Cannot Create New Fine-Scale Transitions
  statement_summary: "If Γ'(x_t) != Γ'(x_{t-1}), then Γ(x_t) != Γ(x_{t-1})."
  assumptions:
    - Γ' = π∘Γ
  variables:
    - "Gamma: fine regime map"
    - "Gamma': coarsened regime map"
    - "transition_flag: fine/coarse transition indicators"
  expected_behavior:
    - every coarse transition corresponds to a fine transition
  witness_cases:
    - fine/coarse transition rows
    - coarsening implication rows
  runner: runners::srd
  outputs:
    - theorem_witness_csv
- id: SRD-19
  component: srd
  ordinal: 19
  title: Regime Transition Count Under Coarsening
  statement_summary: "The number of transitions under coarsened labels is <= the number under fine labels."
  assumptions:
    - coarsening map π
  variables:
    - "Gamma: fine regime map"
    - "Gamma': coarsened regime map"
    - "transition_count: fine vs coarse"
  expected_behavior:
    - coarse transition count bounded by fine count
  witness_cases:
    - fine/coarse count rows
    - coarsened transition summary rows
  runner: runners::srd
  outputs:
    - theorem_witness_csv
- id: SRD-20
  component: srd
  ordinal: 20
  title: Finite Regime Sequence Eventual Periodicity Under Periodic States
  statement_summary: "If the state trajectory is periodic with period p, the induced regime sequence is periodic with period dividing p."
  assumptions:
    - periodic state trajectory
  variables:
    - "x_t: periodic state trajectory"
    - "Gamma(x_t): regime sequence"
    - "p: state period"
  expected_behavior:
    - periodic label sequence
  witness_cases:
    - periodic state rows
    - periodic regime rows
  runner: runners::srd
  outputs:
    - theorem_witness_csv
