    chapter_name: Hom-Set Reductions
    class_color: partCAT
    anchor_tier: T4
    anchor_bank_ids: [CORE-01, CORE-02]
    operation_phrase_template: "applies a {modifier} {stem} to morphisms in the residual hom-set"
    output_type: morphism class
    input_signal_class: typed deterministic
    stems:
      - hom-set partition
      - hom-set quotient
      - hom-set lift
      - hom-set restriction
      - hom-set extension
      - hom-set product
      - hom-set coproduct
      - hom-set composition
      - hom-set inversion
      - hom-set localisation
    modifiers:
      - skeletal
      - thin
      - groupoid
      - poset
      - finite
      - filtered
      - cofiltered
      - small
      - locally-presentable
      - accessible

