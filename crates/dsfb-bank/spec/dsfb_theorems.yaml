- id: DSFB-01
  component: dsfb
  ordinal: 1
  title: Observation Equivalence is an Equivalence Relation
  statement_summary: "For a forward map F : S -> Y, define s1 ~F s2 iff F(s1)=F(s2). Then ~F is reflexive, symmetric, and transitive."
  assumptions:
    - F is a deterministic function
  variables:
    - "S: structural state space"
    - "Y: observation space"
    - "F: forward operator"
  expected_behavior:
    - witness CSV shows reflexive, symmetric, transitive cases
    - no counterexample under function semantics
  witness_cases:
    - reflexive singleton observation-class witness
    - noninjective multi-state observation-class witness for symmetry and transitivity
  runner: runners::dsfb
  outputs:
    - theorem_witness_csv
- id: DSFB-02
  component: dsfb
  ordinal: 2
  title: Injective Forward Map Implies Unique Structural Observability
  statement_summary: "If F is injective on S0 subseteq S, then every y in F(S0) corresponds to at most one s in S0."
  assumptions:
    - F injective on admissible class S0
  variables:
    - "S0: admissible structural class"
    - "F: forward operator"
    - "y: admissible observation"
  expected_behavior:
    - injective examples yield unique inverse image
    - non-injective examples show ambiguity
  witness_cases:
    - injective singleton inverse-image rows
    - noninjective collision contrast rows
  runner: runners::dsfb
  outputs:
    - theorem_witness_csv
- id: DSFB-03
  component: dsfb
  ordinal: 3
  title: Existence of Exact Reconstruction on the Image
  statement_summary: "If F is injective on S0, there exists a unique reconstruction map R : F(S0) -> S0 with R(F(s))=s."
  assumptions:
    - injective F on S0
  variables:
    - "F: forward operator"
    - "R: reconstruction map on F(S0)"
    - "S0: admissible class"
  expected_behavior:
    - construct explicit inverse on image
    - verify exact recovery rows
  witness_cases:
    - exact inverse rows on the admissible image
    - outside-image contrast rows
  runner: runners::dsfb
  outputs:
    - theorem_witness_csv
- id: DSFB-04
  component: dsfb
  ordinal: 4
  title: Exact Recoverability Implies Forward Injectivity
  statement_summary: "If there exists R such that R(F(s))=s for all s in S0, then F is injective on S0."
  assumptions:
    - exact reconstruction holds on S0
  variables:
    - "F: forward operator"
    - "R: exact left inverse"
    - "S0: admissible class"
  expected_behavior:
    - exact recovery implies no collisions in forward image
  witness_cases:
    - exact recovery rows with no collisions
    - collision contrast rows showing why exact recovery would fail
  runner: runners::dsfb
  outputs:
    - theorem_witness_csv
- id: DSFB-05
  component: dsfb
  ordinal: 5
  title: Exact Recoverability is Equivalent to Injective Structural Observability
  statement_summary: "On S0, existence of exact reconstruction is equivalent to injectivity of F."
  assumptions:
    - deterministic F
  variables:
    - "F: forward operator"
    - "R: reconstruction map"
    - "S0: admissible class"
  expected_behavior:
    - paired examples showing both directions
  witness_cases:
    - injective-implies-recoverable witness rows
    - recoverable-implies-injective witness rows
  runner: runners::dsfb
  outputs:
    - theorem_witness_csv
- id: DSFB-06
  component: dsfb
  ordinal: 6
  title: Replayability of DSFB Reconstruction
  statement_summary: "If R is deterministic, equal observations produce equal reconstructed structural states."
  assumptions:
    - R deterministic
  variables:
    - "R: deterministic reconstruction map"
    - "y: observation"
    - "s: reconstructed structural state"
  expected_behavior:
    - duplicated observation rows map to identical outputs
  witness_cases:
