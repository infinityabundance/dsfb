    - theorem_witness_csv
- id: DSFB-07
  component: dsfb
  ordinal: 7
  title: Exact Reconstruction Eliminates Structural Residual
  statement_summary: "If exact recoverability holds on S0, then for every s in S0, F(R(F(s)))=F(s), so the residual vanishes on F(S0)."
  assumptions:
    - exact recoverability
    - residual defined as E(y)=y-F(R(y))
  variables:
    - "F: forward operator"
    - "R: reconstruction map"
    - "E: residual operator"
  expected_behavior:
    - zero residual on exact cases
    - nonzero residual on approximate or mismatched cases
  witness_cases:
    - exact-image residual-zero rows
    - mismatched reconstruction contrast rows
  runner: runners::dsfb
  outputs:
    - theorem_witness_csv
- id: DSFB-08
  component: dsfb
  ordinal: 8
  title: Residual Vanishing Implies Forward Consistency
  statement_summary: "If E(y)=0, then F(R(y))=y."
  assumptions:
    - residual well-defined
  variables:
    - "E: residual operator"
    - "F: forward operator"
    - "R: reconstruction map"
  expected_behavior:
    - rows with zero residual satisfy forward consistency
