  variables:
    - "rho: topological rank"
    - "u,v: vertices"
    - "reachability: directed path relation"
  expected_behavior:
    - all reachability pairs respect rank order
  witness_cases:
    - topological-rank witness rows
    - reachability-rank comparison rows
  runner: runners::dscd
  outputs:
    - theorem_witness_csv
- id: DSCD-20
  component: dscd
  ordinal: 20
  title: Acyclic Repair by Back-Edge Removal
  statement_summary: "Removing all edges that violate a chosen linear order yields an admissible graph."
