- id: DSCD-01
  component: dscd
  ordinal: 1
  title: Existence of Topological Ordering
  statement_summary: "Every finite admissible DSCD graph (DAG) admits at least one topological ordering."
  assumptions:
    - graph finite
    - graph acyclic
  variables:
    - "G: admissible DSCD graph"
    - "V: finite vertex set"
    - "rho: topological ordering"
  expected_behavior:
    - generate DAGs and topological orders
  witness_cases:
    - finite chain and diamond DAGs
    - deterministic topological-order witness rows
  runner: runners::dscd
  outputs:
    - theorem_witness_csv
- id: DSCD-02
  component: dscd
  ordinal: 2
  title: Causal Antisymmetry
  statement_summary: "In an admissible DSCD graph, if u reaches v and u != v, then v cannot reach u."
  assumptions:
    - graph acyclic
  variables:
    - "u,v: vertices"
    - "reachability: directed path relation"
    - "G: admissible DSCD graph"
  expected_behavior:
    - reachability matrix has no mutual reachability for distinct nodes
  witness_cases:
    - DAG reachability witness rows
    - antisymmetry verification rows
  runner: runners::dscd
  outputs:
    - theorem_witness_csv
- id: DSCD-03
  component: dscd
  ordinal: 3
  title: Irreflexive Reachability
  statement_summary: "No vertex can strictly reach itself through a nontrivial directed path in an admissible DSCD graph."
  assumptions:
    - graph acyclic
  variables:
    - "u: vertex"
    - "G: admissible DSCD graph"
    - "reachability: directed path relation"
  expected_behavior:
    - no positive-length self-reachability
  witness_cases:
    - DAG self-reachability checks
    - path-matrix witness rows
  runner: runners::dscd
  outputs:
    - theorem_witness_csv
- id: DSCD-04
  component: dscd
  ordinal: 4
  title: Edge Addition Criterion for Acyclicity
  statement_summary: "Adding edge (u,v) to an admissible DSCD graph preserves acyclicity iff v does not already reach u."
  assumptions:
    - initial graph acyclic
  variables:
    - "G: initial admissible graph"
    - "(u,v): candidate added edge"
    - "reachability: directed path relation"
  expected_behavior:
    - test safe vs unsafe edge additions
  witness_cases:
    - safe shortcut edge addition
    - unsafe back-edge addition
  runner: runners::dscd
  outputs:
    - theorem_witness_csv
- id: DSCD-05
  component: dscd
  ordinal: 5
  title: Edge Removal Preserves Admissibility
  statement_summary: "Removing edges from an admissible DSCD graph cannot create a cycle."
  assumptions:
    - initial graph acyclic
  variables:
    - "G: admissible graph"
    - "E': removed edge subset"
    - "G-E': pruned graph"
  expected_behavior:
    - all edge-pruned subgraphs remain DAGs
  witness_cases:
    - single-edge pruning rows
    - multi-edge pruning rows
  runner: runners::dscd
  outputs:
    - theorem_witness_csv
- id: DSCD-06
  component: dscd
  ordinal: 6
  title: Monotone Reachability Under Admissible Edge Addition
  statement_summary: "Adding an admissible edge cannot destroy existing reachability relations."
  assumptions:
    - edge addition preserves acyclicity
  variables:
    - "G: initial DAG"
    - "G': admissibly augmented DAG"
    - "reachability: directed path relation"
  expected_behavior:
    - old reachability subset of new reachability
  witness_cases:
    - safe edge augmentation rows
    - reachability containment comparison rows
  runner: runners::dscd
  outputs:
    - theorem_witness_csv
- id: DSCD-07
  component: dscd
  ordinal: 7
  title: Reachability Reduction Under Edge Removal
  statement_summary: "If reachability holds in a pruned graph, it held in the original graph."
  assumptions:
    - edge set reduced
  variables:
    - "G: original graph"
    - "G': pruned graph"
    - "reachability: directed path relation"
  expected_behavior:
    - reduced reachability contained in original reachability
  witness_cases:
    - pruned DAG rows
    - reachability containment rows
  runner: runners::dscd
  outputs:
    - theorem_witness_csv
- id: DSCD-08
  component: dscd
  ordinal: 8
  title: Bound on Directed Path Length
  statement_summary: "In a finite admissible DSCD graph with |V| nodes, every directed path has length at most |V|-1."
  assumptions:
    - graph finite, acyclic
  variables:
    - "G: finite DAG"
    - "|V|: node count"
    - "ell: directed path length"
  expected_behavior:
    - longest path computation respects bound
  witness_cases:
    - small DAG longest-path rows
    - path-length-vs-node-count comparison rows
  runner: runners::dscd
  outputs:
    - theorem_witness_csv
- id: DSCD-09
  component: dscd
  ordinal: 9
  title: Termination of Causal Propagation
