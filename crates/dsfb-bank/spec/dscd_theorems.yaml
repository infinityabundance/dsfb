  outputs:
    - theorem_witness_csv
- id: DSCD-18
  component: dscd
  ordinal: 18
  title: Closure of Admissible Composition Under Common Order
  statement_summary: "If two admissible DSCD graphs share a common topological order, their union is admissible."
