  outputs:
    - theorem_witness_csv
- id: DSCD-13
  component: dscd
  ordinal: 13
  title: Reachability Preservation Under Transitive Reduction
  statement_summary: "The transitive reduction has exactly the same reachability relation as the original DAG."
