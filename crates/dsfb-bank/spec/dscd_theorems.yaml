  outputs:
    - theorem_witness_csv
- id: DSCD-11
  component: dscd
  ordinal: 11
  title: Partial Order Induced by Reachability
  statement_summary: "Define u <= v iff u=v or u reaches v. Then this relation is a partial order on vertices."
  assumptions:
    - graph acyclic
  variables:
    - "u,v: vertices"
    - "<=: reachability-induced relation"
    - "G: admissible DAG"
  expected_behavior:
    - verify reflexivity, antisymmetry, transitivity
  witness_cases:
    - reachability partial-order rows
    - per-graph relation summary rows
  runner: runners::dscd
  outputs:
    - theorem_witness_csv
- id: DSCD-12
  component: dscd
  ordinal: 12
  title: Uniqueness of Transitive Reduction for Finite DAGs
  statement_summary: "Every finite DAG has a unique transitive reduction preserving reachability."
  assumptions:
    - graph finite, acyclic
