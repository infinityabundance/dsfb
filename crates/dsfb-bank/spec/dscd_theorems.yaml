  variables:
    - "G: finite directed graph"
    - "rho: chosen linear order"
    - "G_rho: repaired graph"
  expected_behavior:
    - repaired graph is acyclic
  witness_cases:
    - cyclic candidate graph rows
    - repaired-graph acyclicity rows
