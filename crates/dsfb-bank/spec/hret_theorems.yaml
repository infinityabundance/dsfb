- id: HRET-01
  component: hret
  ordinal: 1
  title: Associativity of Trace Concatenation
  statement_summary: "For traces τ,σ,ρ, one has (τ·σ)·ρ = τ·(σ·ρ)."
  assumptions:
    - finite traces over event alphabet
  variables:
    - "tau,sigma,rho: finite traces"
    - "·: trace concatenation"
    - "|tau|: trace length"
  expected_behavior:
    - concatenation outputs identical both ways
  witness_cases:
    - left-associated concatenation rows
    - right-associated concatenation rows
  runner: runners::hret
  outputs:
    - theorem_witness_csv
- id: HRET-02
  component: hret
  ordinal: 2
  title: Length Additivity
  statement_summary: "|τ·σ| = |τ| + |σ|."
  assumptions:
    - finite traces
  variables:
    - "tau,sigma: finite traces"
    - "|tau|,|sigma|: trace lengths"
    - "tau·sigma: concatenated trace"
  expected_behavior:
    - concatenated lengths add correctly
  witness_cases:
    - concatenated trace rows
    - length comparison rows
  runner: runners::hret
  outputs:
    - theorem_witness_csv
