name: dsfb-semiotics-engine-crate

on:
  workflow_dispatch:
  push:
    paths:
      - "crates/dsfb-semiotics-engine/**"
  pull_request:
    paths:
      - "crates/dsfb-semiotics-engine/**"

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/dsfb-semiotics-engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test

      - name: Cargo doc
        run: cargo doc --no-deps

      - name: Synthetic smoke run
        run: cargo run -- --scenario nominal_stable

      - name: CSV smoke run
        run: cargo run -- --input-mode csv --observed-csv tests/fixtures/observed_fixture.csv --predicted-csv tests/fixtures/predicted_fixture.csv --scenario-id fixture_csv --time-column time

      - name: Sweep smoke run
        run: cargo run -- --sweep-family gradual-drift-slope --sweep-points 3
