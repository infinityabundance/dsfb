name: dsfb-semiotics-engine-crate

on:
  workflow_dispatch:
  push:
    paths:
      - "crates/dsfb-semiotics-engine/**"
  pull_request:
    paths:
      - "crates/dsfb-semiotics-engine/**"

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/dsfb-semiotics-engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test

      - name: Snapshot contract
        run: cargo test --test snapshots

      - name: Property invariants
        run: cargo test --test proptest_invariants

      - name: Cargo doc
        run: cargo doc --no-deps

      - name: Synthetic smoke run
        run: cargo run -- --scenario nominal_stable --output-dir ci-smoke-synthetic

      - name: CSV smoke run
        run: cargo run -- --input-mode csv --observed-csv tests/fixtures/observed_fixture.csv --predicted-csv tests/fixtures/predicted_fixture.csv --scenario-id fixture_csv --time-column time --output-dir ci-smoke-csv

      - name: External-bank smoke run
        run: cargo run -- --scenario nominal_stable --bank-mode external --bank-path tests/fixtures/external_bank_minimal.json --strict-bank-validation --output-dir ci-smoke-external-bank

      - name: Sweep smoke run
        run: cargo run -- --sweep-family gradual-drift-slope --sweep-points 3 --output-dir ci-smoke-sweep

      - name: Figure integrity smoke check
        run: |
          test -f "$(find ci-smoke-synthetic -name figure_integrity_report.json | head -1)"
          test -f "$(find ci-smoke-synthetic -name 'figure_12_semantic_retrieval_heuristics_bank_source.csv' | head -1)"
          test -f "$(find ci-smoke-synthetic -name comparator_results.json | head -1)"
          test -f "$(find ci-smoke-external-bank -name loaded_heuristic_bank_descriptor.json | head -1)"
