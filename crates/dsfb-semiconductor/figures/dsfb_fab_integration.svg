<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <title>DSFB Fab Integration</title>
  <desc>DSFB operates as a side-channel observer and does not modify upstream monitoring or control systems.</desc>
  <rect width="1600" height="900" fill="#ffffff"/>
  <g font-family="Helvetica, Arial, sans-serif" fill="#000000">
    <text x="80" y="85" font-size="38" font-weight="700">DSFB Fab Integration</text>
    <text x="80" y="125" font-size="22">Read-only structural interpretation beside existing semiconductor monitoring systems</text>
  </g>

  <g stroke="#000000" stroke-width="3" fill="#ffffff">
    <rect x="90" y="210" width="220" height="90"/>
    <rect x="90" y="345" width="220" height="90"/>
    <rect x="90" y="480" width="220" height="90"/>
    <rect x="445" y="300" width="300" height="180"/>
    <rect x="860" y="220" width="260" height="150"/>
    <rect x="860" y="430" width="260" height="150"/>
    <rect x="1240" y="250" width="270" height="280"/>
  </g>

  <g font-family="Helvetica, Arial, sans-serif" fill="#000000" text-anchor="middle">
    <text x="200" y="262" font-size="30" font-weight="700">Etch</text>
    <text x="200" y="397" font-size="30" font-weight="700">Litho</text>
    <text x="200" y="532" font-size="30" font-weight="700">CMP</text>

    <text x="595" y="362" font-size="34" font-weight="700">SPC / EWMA / FDC</text>
    <text x="595" y="406" font-size="24">monitoring system</text>

    <text x="990" y="282" font-size="30" font-weight="700">Residuals</text>
    <text x="990" y="322" font-size="22">immutable side tap</text>

    <text x="990" y="492" font-size="30" font-weight="700">DSFB</text>
    <text x="990" y="532" font-size="22">observer-only layer</text>

    <text x="1375" y="316" font-size="30" font-weight="700">Structured episodes</text>
    <text x="1375" y="382" font-size="30" font-weight="700">Semantic tags</text>
    <text x="1375" y="448" font-size="30" font-weight="700">Policy suggestions</text>
  </g>

  <g stroke="#000000" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="310" y1="255" x2="445" y2="255"/>
    <line x1="310" y1="390" x2="445" y2="390"/>
    <line x1="310" y1="525" x2="445" y2="525"/>
    <line x1="745" y1="390" x2="860" y2="390"/>
    <line x1="990" y1="370" x2="990" y2="430"/>
    <line x1="1120" y1="505" x2="1240" y2="505"/>
  </g>

  <g fill="#000000">
    <polygon points="445,255 423,245 423,265"/>
    <polygon points="445,390 423,380 423,400"/>
    <polygon points="445,525 423,515 423,535"/>
    <polygon points="860,390 838,380 838,400"/>
    <polygon points="990,430 980,408 1000,408"/>
    <polygon points="1240,505 1218,495 1218,515"/>
  </g>

  <g font-family="Helvetica, Arial, sans-serif" fill="#000000">
    <text x="790" y="280" font-size="22">alarms</text>
    <text x="790" y="312" font-size="22">residuals</text>

    <text x="820" y="660" font-size="28" font-weight="700">READ-ONLY</text>
    <text x="1040" y="660" font-size="28" font-weight="700">NO FEEDBACK</text>
    <text x="1320" y="660" font-size="28" font-weight="700">NO CONTROL INTERFERENCE</text>

    <text x="80" y="810" font-size="24">Caption: DSFB operates as a side-channel observer and does not modify upstream monitoring or control systems.</text>
  </g>

  <g stroke="#000000" stroke-width="2" stroke-dasharray="10 10" fill="none">
    <line x1="1125" y1="500" x2="1125" y2="240"/>
  </g>
  <g font-family="Helvetica, Arial, sans-serif" fill="#000000">
    <text x="1145" y="235" font-size="18">separate observer path</text>
    <text x="1145" y="525" font-size="18">no return arrow</text>
  </g>
</svg>
