  <title>DSFB Review Surface Compression</title>
  <desc>DSFB restructures residual streams into a compact, high-relevance set of events without altering upstream systems.</desc>
  <rect width="1600" height="900" fill="#ffffff"/>
  <g font-family="Helvetica, Arial, sans-serif" fill="#000000">
    <text x="80" y="80" font-size="38" font-weight="700">DSFB Review Surface Compression</text>
    <text x="80" y="120" font-size="22">Residual streams stay upstream; only the review burden is restructured.</text>
  </g>

  <g stroke="#000000" stroke-width="3" fill="none">
    <rect x="90" y="180" width="570" height="580"/>
    <rect x="940" y="180" width="570" height="580"/>
